<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - User Management</title>
    <link rel="stylesheet" href="../style.css">
    <script src="../authGuard.js" defer></script>
</head>

<body>
    <div id="sidebar"></div>

    <main class="dashboard-main w-full">
        <div class="page-header">
            <h2>User Management</h2>
            <button class="btn-create" onclick="openCreateModal()">+ Create New User</button>
        </div>

        <div class="table-container" style="width: 80%; margin: 0 auto;">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Full Name</th>
                        <th>Role</th>
                        <th>Contact</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="user-table-body">
                </tbody>
            </table>
        </div>
    </main>

    <div class="modal-overlay" id="user-form-modal">
        <div class="modal-box" style="min-width: 450px; text-align: left;">
            <h3 id="modal-title" class="center-text mt-0">Create User</h3>

            <input type="hidden" id="form-userid">

            <label>Username</label>
            <input type="text" id="form-username" placeholder="Username" maxlength="30"
                oninput="this.value = this.value.replace(/[^a-zA-Z0-9_]/g, '')">
            <small id="username-hint" style="color:#888; font-size:11px;">Only letters, numbers, and underscores
                allowed.</small>

            <div id="password-container">
                <label>Password</label>
                <input type="password" id="form-password" placeholder="Password" minlength="6">
                <small style="color:#888; font-size:11px;">Minimum 6 characters.</small>
            </div>

            <div class="split">
                <div>
                    <label>First Name</label>
                    <input type="text" id="form-firstname" placeholder="First Name" maxlength="50"
                        oninput="this.value = this.value.replace(/[^a-zA-Z\s]/g, '')">
                </div>
                <div>
                    <label>Last Name</label>
                    <input type="text" id="form-lastname" placeholder="Last Name" maxlength="50"
                        oninput="this.value = this.value.replace(/[^a-zA-Z\s]/g, '')">
                </div>
            </div>

            <label>Roles</label>
            <div id="form-roles-container" style="display: flex; gap: 20px; margin-bottom: 15px; align-items: center;">
                <label
                    style="display: flex; align-items: center; gap: 6px; font-weight: normal; margin: 0; cursor: pointer;">
                    <input type="checkbox" class="role-checkbox" value="Admin"
                        style="width: 16px; height: 16px; margin: 0; cursor: pointer;">
                    Admin
                </label>
                <label
                    style="display: flex; align-items: center; gap: 6px; font-weight: normal; margin: 0; cursor: pointer;">
                    <input type="checkbox" class="role-checkbox" value="SalesStaff"
                        style="width: 16px; height: 16px; margin: 0; cursor: pointer;">
                    Sales
                </label>
                <label
                    style="display: flex; align-items: center; gap: 6px; font-weight: normal; margin: 0; cursor: pointer;">
                    <input type="checkbox" class="role-checkbox" value="InventoryStaff"
                        style="width: 16px; height: 16px; margin: 0; cursor: pointer;">
                    Inventory
                </label>
            </div>

            <label>Contact Information</label>
            <input type="tel" id="form-contact" placeholder="09xxxxxxxxx" maxlength="11"
                oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 11)">

            <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;">
                <button class="modal-btn btn-cancel" onclick="closeUserModal()">Cancel</button>
                <button class="modal-btn btn-ok" onclick="saveUser()">Save</button>
            </div>

            <div id="delete-zone" style="display:none; margin-top:18px; border-top:1px solid #eee; padding-top:14px;">
                <p class="sub-text" style="margin:0 0 8px 0; color: #888;">⚠ Danger Zone</p>
                <button class="btn-delete" style="width: 100%; margin: 0;" onclick="deleteCurrentUser()">Archive This User</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="alert-modal">
        <div class="modal-box">
            <p id="alert-message"></p>
            <div id="alert-actions"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', fetchUsers);

        async function fetchUsers() {
            try {
                const response = await fetch('/api/users');
                const users = await response.json();

                const tableBody = document.getElementById('user-table-body');
                tableBody.innerHTML = '';

                users.forEach(user => {
                    const row = document.createElement('tr');
                    const userDataStr = JSON.stringify(user).replace(/"/g, '&quot;');

                    row.innerHTML = `
                        <td><strong>${user.username}</strong></td>
                        <td>${user.firstName} ${user.lastName}</td>
                        <td><span class="sub-text">${(user.role || '').replace(/Staff/g, '').replace(/,/g, ', ')}</span></td>
                        <td>${user.contactInfo}</td>
                        <td>
                            <button class="btn-edit" onclick="openEditModal('${userDataStr}')">Edit</button>
                        </td>
                    `;
                    tableBody.appendChild(row);
                });
            } catch (error) {
                console.error("Error fetching users:", error);
            }
        }

        function openCreateModal() {
            document.getElementById('modal-title').innerText = "Create New User";
            document.getElementById('form-userid').value = "";
            document.getElementById('form-username').value = "";
            document.getElementById('form-password').value = "";
            document.getElementById('form-password').placeholder = "Password";
            document.getElementById('form-firstname').value = "";
            document.getElementById('form-lastname').value = "";
            document.getElementById('form-contact').value = "";
            document.querySelectorAll('.role-checkbox').forEach(cb => cb.checked = false);
            document.getElementById('delete-zone').style.display = "none";
            document.getElementById('user-form-modal').style.display = "flex";
        }

        function openEditModal(userDataStr) {
            const user = JSON.parse(userDataStr);

            document.getElementById('modal-title').innerText = "Edit User";
            document.getElementById('form-userid').value = user.userID;
            document.getElementById('form-username').value = user.username;

            // Clear password field. If they type something, it changes. If left blank, it stays the same.
            document.getElementById('form-password').value = "";
            document.getElementById('form-password').placeholder = "Leave blank to keep current password";

            document.getElementById('form-firstname').value = user.firstName;
            document.getElementById('form-lastname').value = user.lastName;
            document.getElementById('form-contact').value = user.contactInfo;

            const roles = (user.role || "").split(',').map(r => r.trim());
            document.querySelectorAll('.role-checkbox').forEach(cb => {
                cb.checked = roles.includes(cb.value);
            });

            document.getElementById('delete-zone').style.display = "block";
            document.getElementById('user-form-modal').style.display = "flex";
        }

        function closeUserModal() {
            document.getElementById('user-form-modal').style.display = "none";
        }

        // --- SAVE (CREATE OR UPDATE) ---
        async function saveUser() {
            const userID = document.getElementById('form-userid').value;
            const username = document.getElementById('form-username').value.trim();
            const rawPassword = document.getElementById('form-password').value.trim();
            const firstName = document.getElementById('form-firstname').value.trim();
            const lastName = document.getElementById('form-lastname').value.trim();

            const checkedRoles = Array.from(document.querySelectorAll('.role-checkbox:checked')).map(cb => cb.value);
            const role = checkedRoles.join(',');

            const contactInfo = document.getElementById('form-contact').value.trim();

            if (!username || !firstName || !lastName || !contactInfo) {
                showAlert("Please fill in all required fields.");
                return;
            }

            if (!role) {
                showAlert("Please select at least one role.");
                return;
            }

            // Username: only letters, numbers, underscores
            if (!/^[a-zA-Z0-9_]+$/.test(username)) {
                showAlert("Username can only contain letters, numbers, and underscores.");
                return;
            }

            // Contact: must be exactly 11 digits and start with 09
            if (!/^09\d{9}$/.test(contactInfo)) {
                showAlert("Contact number must be 11 digits and start with 09 (e.g., 09135513434).");
                return;
            }

            // If creating a new user, password is strictly required
            if (!userID && !rawPassword) {
                showAlert("Password is required for new users.");
                return;
            }

            // Password min length check
            if (rawPassword && rawPassword.length < 6) {
                showAlert("Password must be at least 6 characters long.");
                return;
            }

            const userData = { username, rawPassword, firstName, lastName, role, contactInfo };

            const url = userID ? `/api/users/${userID}` : '/api/users';
            const method = userID ? 'PUT' : 'POST';

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                const result = await response.json();

                if (response.ok) {
                    closeUserModal();
                    fetchUsers();
                    
                    // Instantly refresh sidebar in case the active user edited their own profile
                    if (typeof checkAuth === 'function') {
                        checkAuth();
                    }
                    
                    showAlert(userID ? "User updated successfully!" : "User created successfully!");
                } else {
                    showAlert(result.error || "An error occurred.");
                }
            } catch (error) {
                showAlert("Failed to connect to the server.");
            }
        }

        function deleteCurrentUser() {
            const id = document.getElementById('form-userid').value;
            const username = document.getElementById('form-username').value;
            if (id) {
                confirmDelete(id, username);
            }
        }

        function confirmDelete(id, username) {
            document.getElementById('alert-message').innerText = `Are you sure you want to archive user '${username}'?`;
            document.getElementById('alert-actions').innerHTML = `
                <button class="modal-btn btn-cancel" onclick="closeAlert()">Cancel</button>
                <button class="modal-btn btn-danger" onclick="deleteUser(${id})">Archive</button>
            `;
            document.getElementById('alert-modal').style.display = 'flex';
        }

        async function deleteUser(id) {
            try {
                const response = await fetch(`/api/users/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    closeAlert();
                    closeUserModal();
                    fetchUsers();
                } else {
                    const result = await response.json();
                    showAlert(result.error || "Failed to delete user.");
                }
            } catch (error) {
                showAlert("Failed to connect to the server.");
            }
        }

        // --- UTILITY ALERTS ---
        function closeAlert() {
            document.getElementById('alert-modal').style.display = 'none';
        }

        function showAlert(message) {
            document.getElementById('alert-message').innerText = message;
            document.getElementById('alert-actions').innerHTML = `
                <button class="modal-btn btn-ok" onclick="closeAlert()">OK</button>
            `;
            document.getElementById('alert-modal').style.display = 'flex';
        }
    </script>
</body>

</html>

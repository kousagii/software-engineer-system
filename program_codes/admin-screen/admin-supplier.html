<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier Management | Udicon Trading</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .supplier-product-item {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin-bottom: 10px;
            background: #ffffff;
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            cursor: pointer;
        }
        .supplier-product-item:hover {
            border-color: #356ac3;
            box-shadow: 0 4px 6px rgba(53, 106, 195, 0.1);
        }
        .supplier-product-item.selected {
            border-color: #356ac3;
            background: #f8faff;
        }
        .product-checkbox {
            width: 18px;
            height: 18px;
            margin-right: 15px;
            cursor: pointer;
            accent-color: #356ac3;
        }
        .supplier-product-name {
            flex: 1;
            font-size: 14px;
            font-weight: 500;
            color: #1e293b;
        }
        .supplier-price-wrapper {
            display: flex;
            align-items: center;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            overflow: hidden;
            width: 130px;
            background: #ffffff;
            opacity: 0;
            pointer-events: none;
            transform: translateX(10px);
            transition: all 0.3s ease;
        }
        .supplier-price-wrapper.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(0);
        }
        .supplier-price-wrapper span {
            background: #f1f5f9;
            padding: 6px 12px;
            color: #64748b;
            font-size: 14px;
            font-weight: 600;
            border-right: 1px solid #cbd5e1;
        }
        .supplier-price-wrapper input {
            border: none !important;
            padding: 6px 10px !important;
            width: 100% !important;
            margin: 0 !important;
            outline: none !important;
            font-size: 14px;
            color: #0f172a;
        }
        .supplier-price-wrapper input:focus {
            box-shadow: none !important;
        }
    </style>
</head>

<body>
    <div id="sidebar"></div>

    <div id="custom-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <div id="modal-message"></div>
            <div id="modal-actions" style="margin-top: 20px;"></div>
        </div>
    </div>

    <main class="dashboard-main">

        <div id="supplier-list-view" class="w-full">
            <div class="page-header">
                <h2>Supplier Management</h2>
                <button class="btn-create" onclick="openForm()">+ Create Supplier</button>
            </div>

            <div class="form-panel toolbar">
                <div class="search-group">
                    <label>Search</label>
                    <input type="text" id="searchInput" placeholder="Search here..." style="width: 250px;">
                </div>
                <div class="toolbar-right">
                    <div class="sort-group">
                        <label>Show</label>
                        <select id="showLimit" style="width: 70px;">
                            <option value="5">5</option>
                            <option value="10" selected>10</option>
                            <option value="20">20</option>
                            <option value="all">All</option>
                        </select>
                        <label style="margin-left: 20px;">Sort by</label>
                        <select id="sortMode" style="width: 120px;">
                            <option value="default">Newest First</option>
                            <option value="asc">Name (A-Z)</option>
                            <option value="desc">Name (Z-A)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Supplier</th>
                            <th>Contact Number</th>
                            <th>Email</th>
                            <th>Address</th>
                            <th>Terms of Payment</th>
                            <th>Product List</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="supplier-table-body">
                        <tr>
                            <td colspan="7" class="center-text">Loading...</td>
                        </tr>
                    </tbody>
                </table>

                <div id="pagination-controls" class="pagination-container hidden">
                    <button id="btn-prev" onclick="changePage(-1)">Previous</button>
                    <span id="page-info" style="font-size: 14px;">Page 1 of 1</span>
                    <button id="btn-next" onclick="changePage(1)">Next</button>
                </div>
            </div>
        </div>

        <div id="create-supplier-view" class="hidden w-full">
            <div class="page-header">
                <button class="btn-back" onclick="toggleView('supplier-list-view')">← Back to List</button>
            </div>

            <div class="form-panel-wide">
                <h3 id="form-title" style="border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 20px;">
                    📝 Create Supplier
                </h3>

                <div class="split" style="gap: 40px;">
                    <div style="flex: 1;">
                        <label>Name</label>
                        <input type="text" id="supName" placeholder="Supplier Name" maxlength="100">

                        <label>Contact Number</label>
                        <input type="tel" id="supContact" placeholder="09135513434" maxlength="11"
                            oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 11)">

                        <label>Email</label>
                        <input type="email" id="supEmail" placeholder="supplier@gmail.com">

                        <label>Address</label>
                        <textarea id="supAddress" rows="3" placeholder="Address"></textarea>

                        <label>Payment Terms</label>
                        <select id="supTermsSelect" onchange="toggleCustomTerms()"
                            style="width: 100%; margin-bottom: 10px;">
                            <option value="COD">COD</option>
                            <option value="15 Days">15 Days</option>
                            <option value="30 Days">30 Days</option>
                            <option value="60 Days">60 Days</option>
                            <option value="90 Days">90 Days</option>
                            <option value="Others">Others</option>
                        </select>
                        <input type="text" id="supTermsCustom" placeholder="Enter custom term" maxlength="50"
                            style="display: none; width: 100%;">
                    </div>

                    <div style="flex: 1;">
                        <label>Product list (Select all that apply)</label>
                        <input type="text" id="supplierProductSearch" placeholder="Search products..."
                            onkeyup="filterSupplierProducts()" style="margin-bottom: 10px; width: 100%;">
                        <div class="product-select-box" style="max-height: 250px; overflow-y: auto;"
                            id="product-checkbox-container">
                            <p style="color: #888; text-align: center; margin-top: 50px;">Loading products...</p>
                        </div>
                    </div>
                </div>

                <div class="align-right">
                    <button type="button" class="btn-create-supplier active" id="btn-save" onclick="saveSupplier()">Create</button>
                </div>

                <!-- Danger zone: archive only visible in edit mode -->
                <div id="delete-zone"
                    style="display:none; margin-top:18px; border-top:1px solid #eee; padding-top:14px;">
                    <p class="sub-text" style="margin:0 0 8px 0; color: #888;">⚠ Danger Zone</p>
                    <button type="button" class="btn-delete" style="width: 100%; margin: 0;" onclick="deleteCurrentSupplier()">Archive
                        This Supplier</button>
                </div>
            </div>
        </div>

    </main>

    <script src="../authGuard.js"></script>
    <script>
        let supplierList = [], productList = [], currentEditId = null;
        let currentPage = 1, totalPages = 1;

        // --- Utility Helpers ---
        const $ = id => document.getElementById(id);
        const val = (id, v) => v !== undefined ? $(id).value = v : $(id).value;

        function toggleCustomTerms() {
            const select = $('supTermsSelect');
            const customInput = $('supTermsCustom');
            if (select.value === 'Others') {
                customInput.style.display = 'block';
                customInput.focus();
            } else {
                customInput.style.display = 'none';
            }
        }

        // --- Modal & Views ---
        function toggleView(view) {
            $('supplier-list-view').classList.toggle('hidden', view !== 'supplier-list-view');
            $('create-supplier-view').classList.toggle('hidden', view !== 'create-supplier-view');
            if (view === 'supplier-list-view') loadSuppliers();
        }

        const closeModal = () => $('custom-modal').classList.remove('flex');

        function showAlert(msg, isConfirm = false, cb = null) {
            $('modal-message').innerHTML = msg;
            $('modal-actions').innerHTML = isConfirm
                ? `<button class="modal-btn btn-cancel" onclick="closeModal()">Cancel</button>
                   <button class="modal-btn btn-danger" id="conf-btn">Confirm</button>`
                : `<button class="modal-btn btn-ok" onclick="closeModal()">OK</button>`;

            if (cb) {
                $('conf-btn').onclick = () => { closeModal(); cb(); };
            }
            $('custom-modal').classList.add('flex');
        }

        // --- Updated View Products to display as a styled list ---
        function viewProducts(name, productsStr, pricingStr) {
            let listItems = '';
            if (!productsStr) {
                listItems = '<li class="modal-list-item">No products assigned.</li>';
            } else {
                const names = productsStr.split(',');
                const pricingParts = pricingStr ? pricingStr.split(',') : [];
                const priceMap = {};
                
                pricingParts.forEach(part => {
                    const [pid, price] = part.split(':');
                    if (pid && price) priceMap[pid] = price;
                });

                // Assuming productIDs in supplierList is available globally for mapping, or we just map by index
                // Since ORDER BY is used in the query, productNames and productPricing should match by index
                listItems = names.map((pName, i) => {
                    let priceText = '';
                    if (pricingParts[i]) {
                        const [, price] = pricingParts[i].split(':');
                        if (price) priceText = `<span style="float:right; color:#28a745; font-weight:bold;">₱ ${parseFloat(price).toFixed(2)}</span>`;
                    }
                    return `<li class="modal-list-item" style="display:block; overflow:hidden;">${pName.trim()} ${priceText}</li>`;
                }).join('');
            }

            showAlert(`
                <h3 style="margin-top: 0; margin-bottom: 15px; font-size: 18px;">Products for ${name}:</h3>
                <ul class="modal-product-list">
                    ${listItems}
                </ul>
            `);
        }

        // --- Core Algorithms ---
        async function fetchSuppliers() {
            const search   = val('searchInput');
            const sort     = val('sortMode');
            const limit    = val('showLimit');

            const params = new URLSearchParams({ page: currentPage, limit, search, sort });

            $('supplier-table-body').innerHTML = '<tr><td colspan="7" class="center-text">Loading...</td></tr>';

            try {
                const res  = await fetch('/api/suppliers?' + params.toString());
                const json = await res.json();

                supplierList = json.data || [];
                const total = json.total || 0;
                const parsedLimit = limit === 'all' ? total : parseInt(limit);
                totalPages = parsedLimit > 0 ? Math.ceil(total / parsedLimit) : 1;
                if (currentPage > totalPages) currentPage = totalPages;

                renderTable(supplierList);
                updatePaginationUI(total, parsedLimit);
            } catch {
                $('supplier-table-body').innerHTML = '<tr><td colspan="7" class="center-text">Error loading data.</td></tr>';
            }
        }

        function loadSuppliers() { currentPage = 1; fetchSuppliers(); }

        function updatePaginationUI(totalItems, parsedLimit) {
            const paginationEl = $('pagination-controls');
            const limit = val('showLimit');
            if (limit === 'all' || totalItems <= parsedLimit || totalItems === 0) {
                paginationEl.classList.add('hidden');
                paginationEl.classList.remove('flex');
                return;
            }
            $('page-info').innerText = `Page ${currentPage} of ${totalPages}`;
            $('btn-prev').disabled = currentPage === 1;
            $('btn-next').disabled = currentPage === totalPages;
            paginationEl.classList.remove('hidden');
            paginationEl.classList.add('flex');
        }

        function changePage(direction) {
            const next = currentPage + direction;
            if (next < 1 || next > totalPages) return;
            currentPage = next;
            fetchSuppliers();
        }

        function renderTable(data) {
            $('supplier-table-body').innerHTML = data.map(s => {
                const addr = (s.address && s.address.length > 35) ? s.address.substring(0, 35) + '...' : (s.address || 'N/A');
                const count = s.productIDs ? s.productIDs.toString().split(',').length : 0;
                const safeName = s.supplierName.replace(/'/g, "\\'");
                const safeProds = (s.productNames || '').replace(/'/g, "\\'");
                const safePricing = (s.productPricing || '').replace(/'/g, "\\'");
                const terms = s.termsOfPayment || 'COD';

                return `
                    <tr>
                        <td><strong>${s.supplierName}</strong><br><small>ID: ${s.supplierID}</small></td>
                        <td class="sub-text">${s.contactNumber || 'N/A'}</td>
                        <td class="sub-text">${s.email || 'N/A'}</td>
                        <td class="sub-text address-cell">${addr}</td>
                        <td class="sub-text">${terms}</td>
                        <td><button class="btn-view" onclick="viewProducts('${safeName}', '${safeProds}', '${safePricing}')">View (${count})</button></td>
                        <td>
                            <div style="display: flex; gap: 5px;">
                                <button class="btn-edit" onclick="openForm(${s.supplierID})">Edit</button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('') || '<tr><td colspan="7" class="center-text">No results found.</td></tr>';
        }

        // --- Form Logic ---
        function openForm(id = null) {
            currentEditId = id;
            const s = supplierList.find(x => x.supplierID == id) || { supplierName: '', contactNumber: '', email: '', address: '', termsOfPayment: '', productIDs: '' };

            val('supName', s.supplierName || '');
            val('supContact', s.contactNumber || '');
            val('supEmail', s.email || '');
            val('supAddress', s.address || '');

            const predefinedTerms = ['COD', '15 Days', '30 Days', '60 Days', '90 Days'];
            const savedTerm = s.termsOfPayment || 'COD';
            if (predefinedTerms.includes(savedTerm)) {
                val('supTermsSelect', savedTerm);
                val('supTermsCustom', '');
                $('supTermsCustom').style.display = 'none';
            } else {
                val('supTermsSelect', 'Others');
                val('supTermsCustom', savedTerm);
                $('supTermsCustom').style.display = 'block';
            }

            // Clear all checkboxes and prices
            document.querySelectorAll('.supplier-price-input').forEach(input => { input.value = ''; });
            document.querySelectorAll('.supplier-price-wrapper').forEach(wrapper => { wrapper.classList.remove('visible'); });
            document.querySelectorAll('.supplier-product-item').forEach(item => { item.classList.remove('selected'); });
            document.querySelectorAll('.product-checkbox').forEach(cb => cb.checked = false);

            if (s.productPricing) {
                s.productPricing.split(',').forEach(item => {
                    const [pid, price] = item.split(':');
                    const cb = document.querySelector(`.product-checkbox[value="${pid}"]`);
                    if (cb) {
                        cb.checked = true;
                        const input = $('supp-price-' + pid);
                        const wrapper = $('supp-price-wrapper-' + pid);
                        const card = $('supp-item-' + pid);
                        wrapper.classList.add('visible');
                        card.classList.add('selected');
                        if (price) input.value = parseFloat(price).toFixed(2);
                    }
                });
            } else if (s.productIDs) {
                const selectedIDs = (s.productIDs || '').toString().split(',');
                document.querySelectorAll('.product-checkbox').forEach(cb => {
                    if (selectedIDs.includes(cb.value)) {
                        cb.checked = true;
                        $('supp-price-wrapper-' + cb.value).classList.add('visible');
                        $('supp-item-' + cb.value).classList.add('selected');
                    }
                });
            }

            $('form-title').innerHTML = `${id ? 'Edit' : 'Create'} Supplier`;
            $('btn-save').innerText = id ? 'Save Changes' : 'Create';
            $('delete-zone').style.display = id ? 'block' : 'none';

            toggleView('create-supplier-view');
        }

        // --- API Calls ---
        async function fetchProductsForCheckboxes() {
            try {
                const res = await fetch('/api/products?limit=all');
                const json = await res.json();
                productList = json.data || [];
                $('product-checkbox-container').innerHTML = productList.length ? productList.map(p => {
                    const brandStr = p.brand ? ` <span style="color:#64748b; font-size:12px;">(${p.brand})</span>` : '';
                    return `
                    <div class="supplier-product-item product-checkbox-label" id="supp-item-${p.productID}">
                        <label style="display: flex; align-items: center; flex: 1; cursor: pointer; margin: 0;">
                            <input type="checkbox" class="product-checkbox" value="${p.productID}" onchange="togglePriceInput(this, ${p.productID})">
                            <div class="supplier-product-name">${p.productName}${brandStr}</div>
                        </label>
                        <div class="supplier-price-wrapper" id="supp-price-wrapper-${p.productID}">
                            <span>₱</span>
                            <input type="number" id="supp-price-${p.productID}" class="supplier-price-input" placeholder="0.00" step="0.01">
                        </div>
                    </div>
                    `;
                }).join('') : '<p style="color: #888; text-align: center;">No products available.</p>';
            } catch { console.error("Failed to load products for checkboxes."); }
        }

        function filterSupplierProducts() {
            const q = val('supplierProductSearch').toLowerCase();
            document.querySelectorAll('.product-checkbox-label').forEach(label => {
                const text = label.textContent.toLowerCase();
                label.style.display = text.includes(q) ? 'flex' : 'none';
            });
        }

        function togglePriceInput(cb, id) {
            const input = $('supp-price-' + id);
            const wrapper = $('supp-price-wrapper-' + id);
            const item = $('supp-item-' + id);
            if (cb.checked) {
                wrapper.classList.add('visible');
                item.classList.add('selected');
                input.focus();
            } else {
                wrapper.classList.remove('visible');
                item.classList.remove('selected');
                input.value = '';
            }
        }

        async function loadSuppliers() {
            currentPage = 1;
            await fetchSuppliers();
        }

        async function saveSupplier() {
            const termsSelect = val('supTermsSelect');
            const finalTerms = termsSelect === 'Others' ? val('supTermsCustom').trim() : termsSelect;

            if (termsSelect === 'Others' && !finalTerms) return showAlert("Please enter the custom payment term.");

            const productData = Array.from(document.querySelectorAll('.product-checkbox:checked')).map(cb => {
                const pid = parseInt(cb.value);
                const priceVal = $('supp-price-' + pid).value;
                return {
                    id: pid,
                    price: priceVal ? parseFloat(priceVal) : null
                };
            });

            const payload = {
                supplierName: val('supName'),
                contactNumber: val('supContact'),
                email: val('supEmail'),
                address: val('supAddress'),
                termsOfPayment: finalTerms,
                productIDs: productData
            };

            if (!payload.supplierName) return showAlert("Please fill in the Supplier Name!");

            // Validate contact number: must be 11 digits starting with 09
            if (payload.contactNumber && !/^09\d{9}$/.test(payload.contactNumber)) {
                return showAlert("Contact number must be 11 digits and start with 09 (e.g., 09135513434).");
            }

            // Validate email format if provided
            if (payload.email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(payload.email)) {
                return showAlert("Please enter a valid email address.");
            }

            try {
                const res = await fetch(currentEditId ? `/api/suppliers/${currentEditId}` : '/api/suppliers', {
                    method: currentEditId ? 'PUT' : 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    showAlert(`Supplier ${currentEditId ? 'updated' : 'created'} successfully!`);
                    toggleView('supplier-list-view');
                } else {
                    const result = await res.json();
                    showAlert("Error: " + result.error);
                }
            } catch { showAlert("Failed to connect to the server."); }
        }

        function deleteCurrentSupplier() {
            if (!currentEditId) return;
            showAlert("Are you sure you want to archive this supplier?", true, async () => {
                try {
                    const res = await fetch(`/api/suppliers/${currentEditId}`, { method: 'DELETE' });
                    if (res.ok) {
                        showAlert("Supplier archived!");
                        loadSuppliers();
                        toggleView('supplier-list-view');
                    }
                    else { const result = await res.json(); showAlert("Error: " + result.error); }
                } catch { showAlert("Failed to connect to the server."); }
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            fetchProductsForCheckboxes();
            fetchSuppliers();
            $('searchInput').addEventListener('input', () => { currentPage = 1; fetchSuppliers(); });
            $('sortMode').addEventListener('change', () => { currentPage = 1; fetchSuppliers(); });
            $('showLimit').addEventListener('change', () => { currentPage = 1; fetchSuppliers(); });
        });
    </script>
</body>

</html>

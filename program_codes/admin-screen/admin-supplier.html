<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Udicon Trading | Sales & Inventory System</title>
    <link rel="stylesheet" href="../style.css"/>
</head>
<body>
    
<div id="sidebar"></div>

<main>
<div id="supplier" class="tab-content">
            <div class="split">
                <div>
                    <h3>🏢 Create Supplier</h3>
                    <form id="supplierForm" onsubmit="return saveSupplier()">
                        <label for="sname">Supplier Name</label>
                        <input type="text" id="sname" required>

                        <label for="scontact">Contact Number</label>
                        <input type="number" id="scontact" placeholder="09XXXXXXXXX" required>

                        <label for="semail">Email <span style="font-weight: normal; color: #888;">(optional)</span></label>
                        <input type="email" id="semail" placeholder="Leave blank if none">

                        <label for="saddress">Address</label>
                        <textarea id="saddress" rows="3" placeholder="Enter supplier address" required></textarea>

                        <button type="submit">Create Supplier</button>
                    </form>
                </div>
            </div>
        </div>
</main>

<script src="../admin-screen/admin-navbar.js"></script>

<script>
function saveSupplier() {
    const contact = document.getElementById("scontact").value;
    const email = document.getElementById("semail").value.trim();

    // Validate contact number
    if (contact.length !== 11) {
        alert("Contact number must be 11 digits.");
        return false;
    }

    // Validate email if provided
    if (email && !email.includes("@")) {
        alert("Please enter a valid email address or leave it blank.");
        return false;
    }

    alert("Supplier successfully registered!");
    return false;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier Management | Udicon Trading</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div id="sidebar"></div>

    <div id="custom-modal" class="modal-overlay hidden" style="justify-content: center; align-items: center;">
        <div class="modal-box">
            <div id="modal-message"></div>
            <div id="modal-actions" style="margin-top: 20px;"></div>
        </div>
    </div>

    <main class="dashboard-main">
        
        <div id="supplier-list-view" style="width: 100%;">
            <div class="page-header">
                <h2>Supplier Management</h2>
                <button class="btn-create" onclick="openForm()">+ Create Supplier</button>
            </div>

            <div class="form-panel toolbar">
                <div class="search-group">
                    <label>Search</label>
                    <input type="text" id="searchInput" placeholder="Search here..." style="width: 250px;">
                </div>
                <div class="toolbar-right">
                    <div class="sort-group">
                        <label>Show</label>
                        <select id="showLimit" style="width: 70px;">
                            <option value="5">5</option>
                            <option value="10" selected>10</option>
                            <option value="20">20</option>
                            <option value="all">All</option>
                        </select>
                        <label style="margin-left: 20px;">Sort by</label>
                        <select id="sortMode" style="width: 120px;">
                            <option value="default">Default</option>
                            <option value="asc">Name (A-Z)</option>
                            <option value="desc">Name (Z-A)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Supplier</th><th>Contact Number</th><th>Email</th>
                            <th>Address</th><th>Product List</th><th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="supplier-table-body">
                        <tr><td colspan="6" style="text-align: center;">Loading...</td></tr>
                    </tbody>
                </table>

                <div id="pagination-controls" class="pagination-container hidden">
                    <button id="btn-prev" onclick="changePage(-1)">Previous</button>
                    <span id="page-info" style="font-size: 14px;">Page 1 of 1</span>
                    <button id="btn-next" onclick="changePage(1)">Next</button>
                </div>
            </div>
        </div>

        <div id="create-supplier-view" class="hidden" style="width: 100%;">
            <div class="page-header">
                <button class="btn-back" onclick="toggleView('supplier-list-view')">← Back to List</button>
            </div>

            <div class="form-panel-wide">
                <h3 id="form-title" style="border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 20px;">
                    📝 Create Supplier
                </h3>
                
                <div class="split" style="gap: 40px;">
                    <div style="flex: 1;">
                        <label>Name</label>
                        <input type="text" id="supName" placeholder="Supplier Name">
                        
                        <label>Contact Number</label>
                        <input type="text" id="supContact" placeholder="09135513434">
                        
                        <label>Email</label>
                        <input type="email" id="supEmail" placeholder="@gmail.com">
                        
                        <label>Address</label>
                        <textarea id="supAddress" rows="3" placeholder="Address"></textarea>
                    </div>

                    <div style="flex: 1;">
                        <label>Product list (Select all that apply)</label>
                        <div class="product-select-box" style="max-height: 250px; overflow-y: auto;" id="product-checkbox-container">
                            <p style="color: #888; text-align: center; margin-top: 50px;">Loading products...</p>
                        </div>
                    </div>
                </div>

                <div class="align-right">
                    <button class="btn-create-supplier active" id="btn-save" onclick="saveSupplier()">Create</button>
                </div>
            </div>
        </div>

    </main>

    <script src="../authGuard.js"></script>
    <script>
        let supplierList = [], productList = [], currentEditId = null;
        let currentPage = 1; 

        // --- Utility Helpers ---
        const $ = id => document.getElementById(id);
        const val = (id, v) => v !== undefined ? $(id).value = v : $(id).value;

        // --- Modal & Views ---
        function toggleView(view) {
            $('supplier-list-view').classList.toggle('hidden', view !== 'supplier-list-view');
            $('create-supplier-view').classList.toggle('hidden', view !== 'create-supplier-view');
            if (view === 'supplier-list-view') loadSuppliers();
        }

        const closeModal = () => $('custom-modal').classList.remove('flex');

        function showAlert(msg, isConfirm = false, cb = null) {
            $('modal-message').innerHTML = msg;
            $('modal-actions').innerHTML = isConfirm 
                ? `<button class="modal-btn btn-cancel" onclick="closeModal()">Cancel</button>
                   <button class="modal-btn btn-danger" id="conf-btn">Confirm</button>`
                : `<button class="modal-btn btn-ok" onclick="closeModal()">OK</button>`;
            
            if (cb) {
                $('conf-btn').onclick = () => { closeModal(); cb(); };
            }
            $('custom-modal').classList.add('flex');
        }

        // --- Updated View Products to display as a styled list ---
        function viewProducts(name, productsStr) {
            const listItems = productsStr 
                ? productsStr.split(',').map(p => `<li class="modal-list-item">${p.trim()}</li>`).join('') 
                : '<li class="modal-list-item">No products assigned.</li>';
                
            showAlert(`
                <h3 style="margin-top: 0; margin-bottom: 15px; font-size: 18px;">Products for ${name}:</h3>
                <ul class="modal-product-list">
                    ${listItems}
                </ul>
            `);        
        }

        // --- Core Algorithms ---
        function processData() {
            let data = [...supplierList];
            const query = val('searchInput').toLowerCase();
            const sort = val('sortMode');
            const limitVal = val('showLimit');

            // 1. Filter
            if (query) {
                data = data.filter(s => Object.values(s).some(v => String(v).toLowerCase().includes(query)));
            }

            // 2. Sort
            if (sort !== 'default') {
                data.sort((a, b) => sort === 'asc' ? a.supplierName.localeCompare(b.supplierName) : b.supplierName.localeCompare(a.supplierName));
            }

            // 3. Paginate
            let paginatedData;
            if (limitVal === 'all') {
                paginatedData = data;
                updatePaginationUI(data.length, data.length); // Hide pagination if 'all'
            } else {
                const limit = parseInt(limitVal);
                const startIndex = (currentPage - 1) * limit;
                const endIndex = startIndex + limit;
                paginatedData = data.slice(startIndex, endIndex);
                updatePaginationUI(data.length, limit);
            }

            renderTable(paginatedData);
        }

        function updatePaginationUI(totalItems, limit) {
            const paginationEl = $('pagination-controls');
            if (limit === 'all' || limit >= totalItems || totalItems === 0) {
                paginationEl.classList.add('hidden');
                paginationEl.classList.remove('flex');
                return;
            }

            const totalPages = Math.ceil(totalItems / limit);
            if (currentPage > totalPages && totalPages > 0) {
                currentPage = totalPages;
                processData();
                return;
            }

            $('page-info').innerText = `Page ${currentPage} of ${totalPages}`;
            $('btn-prev').disabled = currentPage === 1;
            $('btn-next').disabled = currentPage === totalPages;
            
            paginationEl.classList.remove('hidden');
            paginationEl.classList.add('flex');
        }

        function changePage(direction) {
            currentPage += direction;
            processData();
        }

        function renderTable(data) {
            $('supplier-table-body').innerHTML = data.map(s => {
                const addr = (s.address && s.address.length > 35) ? s.address.substring(0, 35) + '...' : (s.address || 'N/A');
                const count = s.productIDs ? s.productIDs.toString().split(',').length : 0;
                const safeName = s.supplierName.replace(/'/g, "\\'");
                const safeProds = (s.productNames || '').replace(/'/g, "\\'");

                return `
                    <tr>
                        <td><strong>${s.supplierName}</strong><br><small>ID: ${s.supplierID}</small></td>
                        <td class="sub-text">${s.contactNumber || 'N/A'}</td>
                        <td class="sub-text">${s.email || 'N/A'}</td>
                        <td class="sub-text" style="max-width: 200px;">${addr}</td>
                        <td><button class="btn-view" onclick="viewProducts('${safeName}', '${safeProds}')">↗ View (${count})</button></td>
                        <td>
                            <div style="display: flex; gap: 5px;">
                                <button class="btn-edit" onclick="openForm(${s.supplierID})">Edit</button>
                                <button class="btn-delete" onclick="deleteSupplier(${s.supplierID})">Delete</button>
                            </div>
                        </td>
                    </tr>
                `;            
            }).join('') || '<tr><td colspan="6" style="text-align:center;">No results found.</td></tr>';
        }

        // --- Form Logic ---
        function openForm(id = null) {
            currentEditId = id;
            const s = supplierList.find(x => x.supplierID === id) || { supplierName:'', contactNumber:'', email:'', address:'', productIDs:'' };

            val('supName', s.supplierName || '');
            val('supContact', s.contactNumber || '');
            val('supEmail', s.email || '');
            val('supAddress', s.address || '');

            const selectedIDs = (s.productIDs || '').toString().split(',');
            document.querySelectorAll('.product-checkbox').forEach(cb => cb.checked = selectedIDs.includes(cb.value));

            $('form-title').innerHTML = `📝 ${id ? 'Edit' : 'Create'} Supplier`;
            $('btn-save').innerText = id ? 'Save Changes' : 'Create';

            toggleView('create-supplier-view');
        }

        // --- API Calls ---
        async function fetchProductsForCheckboxes() {
            try {
                const res = await fetch('/api/products');
                productList = await res.json();
                $('product-checkbox-container').innerHTML = productList.length ? productList.map(p => `
                    <label style="display: flex; align-items: center; font-weight: normal; margin-top: 5px; cursor: pointer;">
                        <input type="checkbox" class="product-checkbox" value="${p.productID}" style="width: auto; margin-right: 10px; transform: scale(1.2);">
                        ${p.productName}
                    </label>
                `).join('') : '<p style="color: #888; text-align: center;">No products available.</p>';            
            } catch { console.error("Failed to load products for checkboxes."); }
        }

        async function loadSuppliers() {
            try {
                const res = await fetch('/api/suppliers');
                supplierList = await res.json();
                currentPage = 1;
                processData();
            } catch { $('supplier-table-body').innerHTML = '<tr><td colspan="6" style="text-align:center;">Error loading data.</td></tr>'; }
        }

        async function saveSupplier() {
            const payload = {
                supplierName: val('supName'),
                contactNumber: val('supContact'),
                email: val('supEmail'),
                address: val('supAddress'),
                productIDs: Array.from(document.querySelectorAll('.product-checkbox:checked')).map(cb => parseInt(cb.value))
            };

            if (!payload.supplierName) return showAlert("Please fill in the Supplier Name!");

            try {
                const res = await fetch(currentEditId ? `/api/suppliers/${currentEditId}` : '/api/suppliers', {
                    method: currentEditId ? 'PUT' : 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (res.ok) {
                    showAlert(`Supplier ${currentEditId ? 'updated' : 'created'} successfully!`);
                    toggleView('supplier-list-view');
                } else {
                    const result = await res.json();
                    showAlert("Error: " + result.error);
                }
            } catch { showAlert("Failed to connect to the server."); }
        }

        function deleteSupplier(id) {
            showAlert("Are you sure you want to delete this supplier?", true, async () => {
                try {
                    const res = await fetch(`/api/suppliers/${id}`, { method: 'DELETE' });
                    if (res.ok) { showAlert("Supplier deleted!"); loadSuppliers(); } 
                    else { const result = await res.json(); showAlert("Error: " + result.error); }
                } catch { showAlert("Failed to connect to the server."); }
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            fetchProductsForCheckboxes(); 
            loadSuppliers();
            ['searchInput', 'sortMode', 'showLimit'].forEach(id => {
                $(id).addEventListener(id === 'searchInput' ? 'keyup' : 'change', () => {
                    currentPage = 1;
                    processData();
                });
            });
        });
    </script>
</body>
</html>

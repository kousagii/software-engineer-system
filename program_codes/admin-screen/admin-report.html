<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports | Udicon Trading</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>
    <div id="sidebar"></div>

    <div id="custom-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <p id="modal-message"></p>
            <div id="modal-actions"></div>
        </div>
    </div>

    <!-- Hidden container for printable PDF reports -->
    <div id="reportPrintContainer"></div>

    <main class="dashboard-main">
        <div id="report-list-view" class="w-full">

            <div class="page-header">
                <h2>Reports</h2>
                <div class="toolbar-right">
                    <button class="btn-export" onclick="exportToExcel()">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M5 4H15L19 8V20C19 21.1 18.1 22 17 22H5C3.9 22 3 21.1 3 20V6C3 4.9 3.9 4 5 4Z"
                                stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
                            <path d="M15 4V8H19" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                            <path d="M7 12H17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                            <path d="M7 16H13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                        </svg>
                        Export as Excel
                    </button>

                    <button class="btn-export" onclick="exportToPDF()">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M14 2H6C4.89543 2 4 2.89543 4 4V20C4 21.1046 4.89543 22 6 22H18C19.1046 22 20 21.1046 20 20V8L14 2Z"
                                stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                                stroke-linejoin="round" />
                            <path d="M14 2V8H20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                                stroke-linejoin="round" />
                            <path d="M9 15H15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                                stroke-linejoin="round" />
                            <path d="M9 11H11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </svg>
                        Export as PDF
                    </button>
                </div>
            </div>

            <div class="form-panel toolbar" style="margin-bottom: 20px;">
                <div class="toolbar-left">
                    <div class="toolbar-group" id="filterGroup" style="display: flex; gap: 15px;">
                        <div>
                            <label>Report Type</label>
                            <select id="reportType" onchange="changeReportType()">
                                <option value="sales">Sales Performance</option>
                                <option value="userlogs">User Logs</option>
                                <option value="stocks">Stocks Alert</option>
                                <option value="losses">Losses / Defective</option>
                            </select>
                        </div>
                        <div id="userRoleFilterDiv">
                            <label>User Role</label>
                            <select id="userRole" onchange="generateReport()">
                                <option value="">All Roles</option>
                                <option value="admin">Admin</option>
                                <option value="sales">Sales</option>
                                <option value="inventory">Inventory</option>
                            </select>
                        </div>
                        <div id="stockStatusFilterDiv" style="display: none;">
                            <label>Stock Status</label>
                            <select id="stockStatus" onchange="renderReport()">
                                <option value="">All</option>
                                <option value="low">Low Stock</option>
                                <option value="out">Out of Stock</option>
                            </select>
                        </div>
                        <div id="lossSourceFilterDiv" style="display: none;">
                            <label>Source</label>
                            <select id="lossSource" onchange="renderReport()">
                                <option value="">All Sources</option>
                                <option value="po">PO Defective</option>
                                <option value="adjustment">Stock Write-off</option>
                            </select>
                        </div>
                        <div id="dateFromDiv">
                            <label>From Date</label>
                            <input type="date" id="dateFrom">
                        </div>
                        <div id="dateToDiv">
                            <label>To Date</label>
                            <input type="date" id="dateTo">
                        </div>
                    </div>
                </div>

                <div class="toolbar-right">
                    <button class="btn-add hidden" id="btn-auto-reorder-report" onclick="openReorderModal()">
                        Auto Reorder All
                    </button>
                    <button class="btn-search" id="btn-generate-report" onclick="generateReport()">Generate
                        Report</button>
                </div>
            </div>

            <!-- Summary Cards using CSS .split and .form-panel -->
            <div id="report-summary" class="split hidden" style="margin-bottom: 20px; gap: 20px;">
                <div class="form-panel center-text p-20"
                    style="display: flex; flex-direction: column; justify-content: center; align-items: center;">
                    <div class="sub-text" style="text-align: center; width: 100%;">Sales</div>
                    <h3 id="summaryTotal" style="margin: 5px 0 0 0; text-align: center; width: 100%;">₱ 0.00</h3>
                </div>
                <div class="form-panel center-text p-20"
                    style="display: flex; flex-direction: column; justify-content: center; align-items: center;">
                    <div class="sub-text" style="text-align: center; width: 100%;">Purchases</div>
                    <h3 id="summaryExpenses" style="margin: 5px 0 0 0; text-align: center; width: 100%;">₱ 0.00</h3>
                </div>
                <div class="form-panel center-text p-20"
                    style="display: flex; flex-direction: column; justify-content: center; align-items: center;">
                    <div class="sub-text" style="text-align: center; width: 100%;">Income / Gross Margin</div>
                    <h3 id="summaryRevenue" style="margin: 5px 0 0 0; text-align: center; width: 100%;">₱ 0.00</h3>
                </div>
                <div class="form-panel center-text p-20"
                    style="display: flex; flex-direction: column; justify-content: center; align-items: center;">
                    <div class="sub-text" style="text-align: center; width: 100%;">Total Orders</div>
                    <h3 id="summaryOrders" style="margin: 5px 0 0 0; text-align: center; width: 100%;">0</h3>
                </div>
                <div class="form-panel center-text p-20"
                    style="display: flex; flex-direction: column; justify-content: center; align-items: center;">
                    <div class="sub-text" style="text-align: center; width: 100%;">Products Sold</div>
                    <h3 id="summaryProductsSold" style="margin: 5px 0 0 0; text-align: center; width: 100%;">0</h3>
                </div>
            </div>

            <div class="table-container">
                <table class="data-table">
                    <thead id="report-table-head">
                        <tr>
                            <th>Day</th>
                            <th>Total Orders</th>
                            <th>Products Sold</th>
                            <th>Sales</th>
                        </tr>
                    </thead>
                    <tbody id="report-table-body">
                        <tr>
                            <td colspan="4" class="center-text">Loading report...</td>
                        </tr>
                    </tbody>
                </table>

                <div id="pagination-controls" class="pagination-container hidden">
                    <button id="btn-prev" class="btn-cancel" onclick="changePage(-1)">Previous</button>
                    <span id="page-info">Page 1 of 1</span>
                    <button id="btn-next" class="btn-cancel" onclick="changePage(1)">Next</button>
                </div>
            </div>

        </div>
    </main>

    <script src="../authGuard.js"></script>
    <script src="../reorder-modal.js"></script>
    <script>
        let reportData = [];
        let currentPage = 1;
        let currentReportType = 'sales';

        const $ = id => document.getElementById(id);
        const val = (id, v) => v !== undefined ? $(id).value = v : $(id).value;

        const closeModal = () => $('custom-modal').classList.remove('flex');

        function showAlert(msg, isConfirm = false, cb = null) {
            $('modal-message').innerHTML = msg;
            $('modal-actions').innerHTML = isConfirm
                ? `<button class="modal-btn btn-cancel" onclick="closeModal()">Cancel</button><button class="modal-btn btn-ok" id="conf-btn">Confirm</button>`
                : `<button class="modal-btn btn-ok" onclick="closeModal()">OK</button>`;

            if (cb) $('conf-btn').onclick = () => { closeModal(); cb(); };
            $('custom-modal').classList.add('flex');
        }

        function changeReportType() {
            currentReportType = val('reportType');
            currentPage = 1;
            updateReportUI();
            generateReport();
        }

        function updateReportUI() {
            const userRoleDiv = $('userRoleFilterDiv');
            const stockStatusDiv = $('stockStatusFilterDiv');
            const lossSourceDiv = $('lossSourceFilterDiv');
            const summaryPanel = $('report-summary');
            const reorderBtn = $('btn-auto-reorder-report');

            // Hide/show filters based on report type
            if (currentReportType === 'sales') {
                userRoleDiv.style.display = 'none';
                stockStatusDiv.style.display = 'none';
                lossSourceDiv.style.display = 'none';
                summaryPanel.classList.remove('hidden');
                summaryPanel.classList.add('flex');
                if (reorderBtn) reorderBtn.classList.add('hidden');
                $('report-table-head').innerHTML = `
                    <tr>
                        <th>Day</th>
                        <th>Total Orders</th>
                        <th>Products Sold</th>
                        <th>Sales</th>
                    </tr>
                `;
            } else if (currentReportType === 'userlogs') {
                userRoleDiv.style.display = 'flex';
                userRoleDiv.style.flexDirection = 'column';
                userRoleDiv.style.gap = '0';
                stockStatusDiv.style.display = 'none';
                lossSourceDiv.style.display = 'none';
                summaryPanel.classList.add('hidden');
                summaryPanel.classList.remove('flex');
                if (reorderBtn) reorderBtn.classList.add('hidden');
                $('report-table-head').innerHTML = `
                    <tr>
                        <th>Date &amp; Time</th>
                        <th>User</th>
                        <th>Action Performed</th>
                    </tr>
                `;
            } else if (currentReportType === 'stocks') {
                userRoleDiv.style.display = 'none';
                stockStatusDiv.style.display = 'flex';
                stockStatusDiv.style.flexDirection = 'column';
                stockStatusDiv.style.gap = '0';
                lossSourceDiv.style.display = 'none';
                summaryPanel.classList.add('hidden');
                summaryPanel.classList.remove('flex');
                if (reorderBtn) reorderBtn.classList.remove('hidden');
                $('report-table-head').innerHTML = `
                    <tr>
                        <th>Category</th>
                        <th>Product Name</th>
                        <th>Stock Level</th>
                        <th>Threshold</th>
                        <th>Status</th>
                        <th>Supplier(s)</th>
                        <th>Action</th>
                    </tr>
                `;
            } else if (currentReportType === 'losses') {
                userRoleDiv.style.display = 'none';
                stockStatusDiv.style.display = 'none';
                lossSourceDiv.style.display = 'flex';
                lossSourceDiv.style.flexDirection = 'column';
                lossSourceDiv.style.gap = '0';
                summaryPanel.classList.add('hidden');
                summaryPanel.classList.remove('flex');
                if (reorderBtn) reorderBtn.classList.add('hidden');
                $('report-table-head').innerHTML = `
                    <tr>
                        <th>Date</th>
                        <th>Source</th>
                        <th>Product</th>
                        <th>Qty Lost</th>
                        <th>Reason / Reference</th>
                    </tr>
                `;
            }

            // Show/hide date range pickers
            const showDates = currentReportType !== 'stocks';
            $('dateFromDiv').style.display = showDates ? '' : 'none';
            $('dateToDiv').style.display = showDates ? '' : 'none';

            const generateBtn = $('btn-generate-report');
            if (generateBtn) {
                generateBtn.style.display = currentReportType === 'stocks' ? 'none' : 'inline-block';
            }
        }

        // --- Report Data Processing ---
        function generateReport() {
            const dateFrom = val('dateFrom');
            const dateTo = val('dateTo');

            const needsDates = currentReportType !== 'stocks';
            if (needsDates && (!dateFrom || !dateTo)) {
                showAlert('Please select both From and To dates.');
                return;
            }

            loadReportData();
        }

        async function loadReportData() {
            const roleParam = currentReportType === 'userlogs' ? `&role=${val('userRole')}` : '';
            const stockParam = currentReportType === 'stocks' ? `&status=${val('stockStatus')}` : '';
            const noDates = currentReportType === 'stocks';
            const dateParams = noDates ? '' : `from=${val('dateFrom')}&to=${val('dateTo')}`;

            try {
                const response = await fetch(`/api/reports/${currentReportType}?${dateParams}${roleParam}${stockParam}`);

                if (!response.ok) {
                    showAlert('Failed to load report data. Server returned an error.');
                    reportData = [];
                } else {
                    reportData = await response.json();
                }
                processData();
            } catch (error) {
                console.error('Report fetch error:', error);
                showAlert('Could not connect to the server.');
                reportData = [];
                processData();
            }
        }

        function processData() {
            currentPage = 1;
            if (currentReportType === 'sales') {
                reportData = reportData.map(r => ({
                    day: new Date(r.day).toLocaleDateString('en-PH', { month: 'numeric', day: 'numeric', year: '2-digit' }),
                    orders: parseInt(r.orders) || 0,
                    productsSold: parseInt(r.productsSold) || 0,
                    salesRaw: parseFloat(r.sales) || 0,
                    expensesRaw: parseFloat(r.expenses) || 0,
                    sales: `₱ ${parseFloat(r.sales || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`
                }));
            } else if (currentReportType === 'userlogs') {
                reportData = reportData.map(r => {
                    const dt = new Date(r.dateTime);
                    let roleLabel = r.userType || '—';
                    if (r.userType === 'Admin') roleLabel = 'Admin';
                    else if (r.userType === 'SalesStaff') roleLabel = 'Sales';
                    else if (r.userType === 'InventoryStaff') roleLabel = 'Inventory';
                    return {
                        date: dt.toLocaleDateString('en-PH', { month: 'numeric', day: 'numeric', year: 'numeric' }),
                        time: dt.toLocaleTimeString('en-PH', { hour: 'numeric', minute: '2-digit', hour12: true }),
                        userName: r.userName || '—',
                        userType: roleLabel,
                        action: r.action || '—'
                    };
                });
            } else if (currentReportType === 'losses') {
                reportData = reportData.map(r => {
                    const rawDate = r.lossDate || r.date || null;
                    // rawDate may be a JS Date object (from MySQL) or a YYYY-MM-DD string
                    let dt = null;
                    if (rawDate) {
                        if (rawDate instanceof Date) {
                            dt = rawDate;
                        } else {
                            // Parse as local date to avoid UTC midnight shift
                            dt = new Date(String(rawDate).replace(' ', 'T').split('T')[0] + 'T00:00:00');
                        }
                    }
                    return {
                        date: dt && !isNaN(dt) ? dt.toLocaleDateString('en-PH', { month: 'numeric', day: 'numeric', year: 'numeric' }) : '—',
                        source: r.source || '—',
                        sourceType: r.sourceType || '',
                        product: r.product || '—',
                        qtyLost: r.qtyLost || 0,
                        reason: r.reason || '—'
                    };
                });
            }

            renderReport();
            if (currentReportType === 'sales') {
                updateSummary();
            }
            if (currentReportType === 'losses') {
                updateLossesSummary();
            }
        }

        function renderReport() {
            const tbody = $('report-table-body');
            const limit = 10;
            let filteredData = [...reportData];

            if (currentReportType === 'userlogs') {
                const roleFilter = val('userRole');
                if (roleFilter) {
                    filteredData = filteredData.filter(log => {
                        if (roleFilter === 'admin') return log.userType === 'Admin';
                        if (roleFilter === 'sales') return log.userType === 'Sales';
                        if (roleFilter === 'inventory') return log.userType === 'Inventory';
                        return true;
                    });
                }
            } else if (currentReportType === 'stocks') {
                const stockFilter = val('stockStatus');
                if (stockFilter) {
                    filteredData = filteredData.filter(item => item.status === (stockFilter === 'low' ? 'Low Stock' : 'Out of Stock'));
                }
            } else if (currentReportType === 'losses') {
                const srcFilter = val('lossSource');
                if (srcFilter) {
                    filteredData = filteredData.filter(r => r.sourceType === srcFilter);
                }
            }

            const totalPages = Math.ceil(filteredData.length / limit) || 1;
            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            const startIndex = (currentPage - 1) * limit;
            const endIndex = startIndex + limit;
            const paginatedData = filteredData.slice(startIndex, endIndex);

            if (currentReportType === 'sales') {
                tbody.innerHTML = paginatedData.map(r => `
                    <tr>
                        <td>${r.day}</td>
                        <td>${r.orders}</td>
                        <td>${r.productsSold}</td>
                        <td>${r.sales}</td>
                    </tr>
                `).join('') || '<tr><td colspan="4" class="center-text">No data available.</td></tr>';
            } else if (currentReportType === 'userlogs') {
                tbody.innerHTML = paginatedData.map(r => `
                    <tr>
                        <td>
                            <div class="datetime-cell">
                                <span class="date-label">${r.date}</span>
                                <span class="time-label">${r.time}</span>
                            </div>
                        </td>
                        <td>
                            <div class="user-cell">
                                <span class="user-name">${r.userName}</span>
                                <span class="user-type">${r.userType}</span>
                            </div>
                        </td>
                        <td>${r.action}</td>
                    </tr>
                `).join('') || '<tr><td colspan="3" class="center-text">No data available.</td></tr>';
            } else if (currentReportType === 'stocks') {
                tbody.innerHTML = paginatedData.map(r => {
                    const isOut = r.status === 'Out of Stock';
                    const badgeCls = isOut ? 'supplier-badge out-stock' : 'supplier-badge low-stock';
                    const supplierCell = r.suppliers
                        ? r.suppliers.split(',').map(s => `<span class="${badgeCls}">${s.trim()}</span>`).join(' ')
                        : '<span class="no-supplier-tag">No supplier</span>';
                    const reorderBtn = r.suppliers
                        ? `<button class="btn-edit" onclick="openReorderModal(${r.productID})">Reorder</button>`
                        : '<span class="no-supplier-tag">—</span>';
                    return `
                    <tr>
                        <td>${r.category}</td>
                        <td><strong>${r.product}</strong></td>
                        <td>${r.stocks}</td>
                        <td>${r.threshold}</td>
                        <td><span class="status-pill ${isOut ? 'status-outstock' : 'status-lowstock'}">${r.status}</span></td>
                        <td>${supplierCell}</td>
                        <td>${reorderBtn}</td>
                    </tr>`;
                }).join('') || '<tr><td colspan="7" class="center-text">No data available.</td></tr>';
            } else if (currentReportType === 'losses') {
                tbody.innerHTML = paginatedData.map(r => `
                    <tr>
                        <td>
                            <div class="datetime-cell">
                                <span class="date-label">${r.date}</span>
                            </div>
                        </td>
                        <td><span class="status-pill ${r.sourceType === 'po' ? 'status-lowstock' : 'status-outstock'}">${r.source}</span></td>
                        <td>${r.product}</td>
                        <td><strong>${r.qtyLost}</strong></td>
                        <td class="sub-text">${r.reason}</td>
                    </tr>
                `).join('') || '<tr><td colspan="5" class="center-text">No losses recorded in this period.</td></tr>';
            }

            updatePaginationUI(filteredData.length, totalPages);
        }

        function updateLossesSummary() {
            // Could add a summary card for total losses in the future
        }

        function updateSummary() {
            if (currentReportType !== 'sales') return;

            const totalSales = reportData.reduce((sum, r) => sum + (r.salesRaw || 0), 0);
            const totalExpenses = reportData.reduce((sum, r) => sum + (r.expensesRaw || 0), 0);
            const totalRevenue = totalSales - totalExpenses;
            const totalOrders = reportData.reduce((sum, r) => sum + r.orders, 0);
            const totalProductsSold = reportData.reduce((sum, r) => sum + r.productsSold, 0);

            $('summaryTotal').textContent = `₱ ${totalSales.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
            $('summaryExpenses').textContent = `₱ ${totalExpenses.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
            $('summaryRevenue').textContent = `₱ ${totalRevenue.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
            $('summaryOrders').textContent = totalOrders;
            $('summaryProductsSold').textContent = totalProductsSold;
        }

        function updatePaginationUI(totalItems, totalPages) {
            const container = $('pagination-controls');
            if (totalItems <= 10) {
                container.classList.add('hidden');
                container.classList.remove('flex');
                return;
            }

            container.classList.remove('hidden');
            container.classList.add('flex');
            $('page-info').textContent = `Page ${currentPage} of ${totalPages}`;
            $('btn-prev').disabled = currentPage === 1;
            $('btn-next').disabled = currentPage === totalPages;
        }

        function changePage(step) {
            currentPage += step;
            renderReport();
        }

        // --- Export Functions ---

        function getExportData() {
            let headers = [];
            let rows = [];

            if (currentReportType === 'sales') {
                headers = ['Day', 'Total Orders', 'Products Sold', 'Sales'];
                rows = reportData.map(r => [r.day, r.orders, r.productsSold, r.sales]);
            } else if (currentReportType === 'userlogs') {
                headers = ['Date', 'Time', 'User', 'Role', 'Action Performed'];
                rows = reportData.map(r => [r.date, r.time, r.userName, r.userType, r.action]);
            } else if (currentReportType === 'stocks') {
                headers = ['Category', 'Product Name', 'Stock Level', 'Threshold', 'Status'];
                rows = reportData.map(r => [r.category, r.product, r.stocks, r.threshold, r.status]);
            } else if (currentReportType === 'losses') {
                headers = ['Date', 'Source', 'Product', 'Qty Lost', 'Reason / Reference'];
                rows = reportData.map(r => [r.date, r.source, r.product, r.qtyLost, r.reason]);
            }

            return { headers, rows };
        }

        function exportToExcel() {
            if (!reportData || reportData.length === 0) {
                showAlert('No data to export. Generate a report first.');
                return;
            }

            const { headers, rows } = getExportData();
            const reportLabel = currentReportType === 'sales' ? 'Sales Performance'
                : currentReportType === 'userlogs' ? 'User Logs'
                    : currentReportType === 'losses' ? 'Losses & Defective'
                        : 'Stock Alerts';

            // Build CSV content with BOM for Excel compatibility
            let csv = '\uFEFF'; // UTF-8 BOM
            csv += `Udicon Trading - ${reportLabel} Report\n`;
            if (currentReportType !== 'stocks') {
                csv += `Date Range: ${val('dateFrom')} to ${val('dateTo')}\n`;
            }
            csv += `Generated: ${new Date().toLocaleString('en-PH')}\n\n`;

            // Add summary for sales
            if (currentReportType === 'sales') {
                const totalSales = reportData.reduce((sum, r) => sum + (r.salesRaw || 0), 0);
                const totalOrders = reportData.reduce((sum, r) => sum + r.orders, 0);
                const totalProductsSold = reportData.reduce((sum, r) => sum + r.productsSold, 0);
                csv += `Total Sales,₱ ${totalSales.toLocaleString('en-US', { minimumFractionDigits: 2 })}\n`;
                csv += `Total Orders,${totalOrders}\n`;
                csv += `Total Products Sold,${totalProductsSold}\n\n`;
            }

            // Escape CSV fields
            const escapeCSV = (val) => {
                const str = String(val ?? '');
                if (str.includes(',') || str.includes('"') || str.includes('\n')) {
                    return '"' + str.replace(/"/g, '""') + '"';
                }
                return str;
            };

            csv += headers.map(escapeCSV).join(',') + '\n';
            rows.forEach(row => {
                csv += row.map((val, index) => {
                    let str = String(val ?? '');
                    if (index === 0) {
                        str = '\t' + str;
                    }
                    return escapeCSV(str);
                }).join(',') + '\n';
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `udicon-${currentReportType}-report-${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);
        }

        function exportToPDF() {
            if (!reportData || reportData.length === 0) {
                showAlert('No data to export. Generate a report first.');
                return;
            }

            const { headers, rows } = getExportData();
            const reportLabel = currentReportType === 'sales' ? 'Sales Performance'
                : currentReportType === 'userlogs' ? 'User Logs'
                    : currentReportType === 'losses' ? 'Losses & Defective'
                        : 'Stock Alerts';

            const dateInfo = currentReportType === 'stocks'
                ? `Generated: ${new Date().toLocaleString('en-PH')}`
                : `Date Range: ${val('dateFrom')} to ${val('dateTo')}<br>Generated: ${new Date().toLocaleString('en-PH')}`;

            let html = `
                <div style="text-align: center; margin-bottom: 20px; font-family: Arial, sans-serif;">
                    <h2 style="margin: 0; font-size: 24px; color: #333;">Udicon Trading</h2>
                    <h3 style="margin: 5px 0; font-size: 18px; color: #555;">${reportLabel} Report</h3>
                    <p style="margin: 5px 0; font-size: 14px; color: #777;">${dateInfo}</p>
                </div>
            `;

            if (currentReportType === 'sales') {
                const totalSales = reportData.reduce((sum, r) => sum + (r.salesRaw || 0), 0);
                const totalExpenses = reportData.reduce((sum, r) => sum + (r.expensesRaw || 0), 0);
                const totalRevenue = totalSales - totalExpenses;
                const totalOrders = reportData.reduce((sum, r) => sum + r.orders, 0);
                const totalProductsSold = reportData.reduce((sum, r) => sum + r.productsSold, 0);
                html += `
                    <div style="display: flex; flex-wrap: wrap; justify-content: space-around; margin-bottom: 20px; font-weight: bold; padding: 10px; background-color: #f8f9fa; border: 1px solid #ddd; font-family: Arial, sans-serif; font-size: 13px; gap: 10px;">
                        <span>Total Sales: ₱ ${totalSales.toLocaleString('en-US', { minimumFractionDigits: 2 })}</span>
                        <span>Purchases: ₱ ${totalExpenses.toLocaleString('en-US', { minimumFractionDigits: 2 })}</span>
                        <span>Income: ₱ ${totalRevenue.toLocaleString('en-US', { minimumFractionDigits: 2 })}</span>
                        <span>Orders: ${totalOrders}</span>
                        <span>Products Sold: ${totalProductsSold}</span>
                    </div>
                `;
            } else if (currentReportType === 'losses') {
                const totalLost = reportData.reduce((sum, r) => sum + (parseInt(r.qtyLost) || 0), 0);
                html += `
                    <div style="display: flex; justify-content: space-around; margin-bottom: 20px; font-weight: bold; padding: 10px; background-color: #f8f9fa; border: 1px solid #ddd; font-family: Arial, sans-serif; font-size: 13px;">
                        <span>Total Quantity Lost: ${totalLost}</span>
                    </div>
                `;
            } else if (currentReportType === 'stocks') {
                const outOfStock = reportData.filter(r => r.status === 'Out of Stock').length;
                const lowStock = reportData.filter(r => r.status === 'Low Stock').length;
                html += `
                    <div style="display: flex; justify-content: space-around; margin-bottom: 20px; font-weight: bold; padding: 10px; background-color: #f8f9fa; border: 1px solid #ddd; font-family: Arial, sans-serif; font-size: 13px;">
                        <span>Out of Stock Items: ${outOfStock}</span>
                        <span>Low Stock Items: ${lowStock}</span>
                        <span>Total Flagged Items: ${reportData.length}</span>
                    </div>
                `;
            }

            html += '<table style="width: 100%; border-collapse: collapse; font-family: Arial, sans-serif; font-size: 13px;"><thead><tr>';
            headers.forEach(h => {
                html += `<th style="border: 1px solid #ddd; padding: 10px 8px; text-align: left; background-color: #f2f2f2 !important; -webkit-print-color-adjust: exact;">${h}</th>`;
            });
            html += '</tr></thead><tbody>';

            rows.forEach(row => {
                html += '<tr>';
                row.forEach(cell => {
                    html += `<td style="border: 1px solid #ddd; padding: 8px;">${cell}</td>`;
                });
                html += '</tr>';
            });

            html += '</tbody></table>';

            const printContainer = document.getElementById('reportPrintContainer');
            printContainer.innerHTML = html;

            // Dynamically add a page margin just for this PDF report
            const printStyle = document.createElement('style');
            printStyle.innerHTML = '@media print { @page { margin: 15mm !important; } }';
            document.head.appendChild(printStyle);

            // Allow DOM to update then trigger print
            setTimeout(() => {
                window.print();
                document.head.removeChild(printStyle);
            }, 100);
        }



        // --- Initialization ---
        window.onAuthReady = function (role) {
            if (role !== 'Admin') {
                // Inventory staff cannot see User Logs
                const userLogsOpt = document.querySelector('#reportType option[value="userlogs"]');
                if (userLogsOpt) userLogsOpt.remove();
                const userRoleDiv = $('userRoleFilterDiv');
                if (userRoleDiv) userRoleDiv.style.display = 'none';
            }
            // Both Admin and Staff can view the Losses report
        };

        document.addEventListener("DOMContentLoaded", () => {
            const today = new Date();
            const from = new Date(today);
            from.setDate(today.getDate() - 7);

            // Format dates as YYYY-MM-DD in local time
            const formatDate = (date) => {
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            };

            $('dateFrom').value = formatDate(from);
            $('dateTo').value = formatDate(today);

            updateReportUI();
            generateReport();
        });
    </script>
</body>

</html>

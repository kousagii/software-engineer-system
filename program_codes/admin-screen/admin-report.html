<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports | Udicon Trading</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>
    <div id="sidebar"></div>

    <div id="custom-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <p id="modal-message"></p>
            <div id="modal-actions"></div>
        </div>
    </div>

    <main class="dashboard-main">
        <div id="report-list-view" class="w-full">

            <div class="page-header">
                <h2>Reports</h2>
                <div class="toolbar-right">
                    <button class="btn-export" onclick="exportToExcel()">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M5 4H15L19 8V20C19 21.1 18.1 22 17 22H5C3.9 22 3 21.1 3 20V6C3 4.9 3.9 4 5 4Z"
                                stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
                            <path d="M15 4V8H19" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                            <path d="M7 12H17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                            <path d="M7 16H13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                        </svg>
                        Export as Excel
                    </button>
                    <button class="btn-export" onclick="exportAsImage()">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M4 5H20V19H4V5Z" stroke="currentColor" stroke-width="1.8"
                                stroke-linejoin="round" />
                            <path d="M4 8H20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                            <path d="M8 15.5L11 12L14 15.5L18 11" stroke="currentColor" stroke-width="1.8"
                                stroke-linecap="round" stroke-linejoin="round" />
                            <path d="M8 10H8.01" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                        </svg>
                        Export as Image
                    </button>
                </div>
            </div>

            <div class="form-panel toolbar" style="margin-bottom: 20px;">
                <div class="toolbar-left">
                    <div class="toolbar-group" id="filterGroup" style="display: flex; gap: 15px;">
                        <div>
                            <label>Report Type</label>
                            <select id="reportType" onchange="changeReportType()">
                                <option value="sales">Sales Performance</option>
                                <option value="userlogs">User Logs</option>
                                <option value="stocks">Stocks Alert</option>
                            </select>
                        </div>
                        <div id="userRoleFilterDiv">
                            <label>User Role</label>
                            <select id="userRole" onchange="renderReport()">
                                <option value="">All Roles</option>
                                <option value="admin">Admin</option>
                                <option value="sales">Sales</option>
                                <option value="inventory">Inventory</option>
                            </select>
                        </div>
                        <div id="stockStatusFilterDiv" style="display: none;">
                            <label>Stock Status</label>
                            <select id="stockStatus" onchange="renderReport()">
                                <option value="">All</option>
                                <option value="low">Low Stock</option>
                                <option value="out">Out of Stock</option>
                            </select>
                        </div>
                        <div id="dateFromDiv">
                            <label>From Date</label>
                            <input type="date" id="dateFrom">
                        </div>
                        <div id="dateToDiv">
                            <label>To Date</label>
                            <input type="date" id="dateTo">
                        </div>
                    </div>
                </div>

                <div class="toolbar-right">
                    <button class="btn-search" onclick="generateReport()">Generate Report</button>
                </div>
            </div>

            <!-- Summary Cards using CSS .split and .form-panel -->
            <div id="report-summary" class="split hidden" style="margin-bottom: 20px; gap: 20px;">
                <div class="form-panel center-text p-20">
                    <div class="sub-text">Sales</div>
                    <h3 id="summaryTotal" class="mt-0">₱ 0.00</h3>
                </div>
                <div class="form-panel center-text p-20">
                    <div class="sub-text">Expenses</div>
                    <h3 id="summaryExpenses" class="mt-0">₱ 0.00</h3>
                </div>
                <div class="form-panel center-text p-20">
                    <div class="sub-text">Revenue</div>
                    <h3 id="summaryRevenue" class="mt-0">₱ 0.00</h3>
                </div>
                <div class="form-panel center-text p-20">
                    <div class="sub-text">Total Orders</div>
                    <h3 id="summaryOrders" class="mt-0">0</h3>
                </div>
                <div class="form-panel center-text p-20">
                    <div class="sub-text">Products Sold</div>
                    <h3 id="summaryProductsSold" class="mt-0">0</h3>
                </div>
            </div>

            <div class="table-container">
                <table class="data-table">
                    <thead id="report-table-head">
                        <tr>
                            <th>Day</th>
                            <th>Total Orders</th>
                            <th>Products Sold</th>
                            <th>Sales</th>
                        </tr>
                    </thead>
                    <tbody id="report-table-body">
                        <tr>
                            <td colspan="4" class="center-text">Loading report...</td>
                        </tr>
                    </tbody>
                </table>

                <div id="pagination-controls" class="pagination-container hidden">
                    <button id="btn-prev" class="btn-cancel" onclick="changePage(-1)">Previous</button>
                    <span id="page-info">Page 1 of 1</span>
                    <button id="btn-next" class="btn-cancel" onclick="changePage(1)">Next</button>
                </div>
            </div>

        </div>
    </main>

    <script src="../authGuard.js"></script>
    <script>
        let reportData = [];
        let currentPage = 1;
        let currentReportType = 'sales';

        const $ = id => document.getElementById(id);
        const val = (id, v) => v !== undefined ? $(id).value = v : $(id).value;

        const closeModal = () => $('custom-modal').classList.remove('flex');

        function showAlert(msg, isConfirm = false, cb = null) {
            $('modal-message').innerHTML = msg;
            $('modal-actions').innerHTML = isConfirm
                ? `<button class="modal-btn btn-cancel" onclick="closeModal()">Cancel</button><button class="modal-btn btn-ok" id="conf-btn">Confirm</button>`
                : `<button class="modal-btn btn-ok" onclick="closeModal()">OK</button>`;

            if (cb) $('conf-btn').onclick = () => { closeModal(); cb(); };
            $('custom-modal').classList.add('flex');
        }

        function changeReportType() {
            currentReportType = val('reportType');
            currentPage = 1;
            updateReportUI();
            generateReport();
        }

        function updateReportUI() {
            const userRoleDiv = $('userRoleFilterDiv');
            const stockStatusDiv = $('stockStatusFilterDiv');
            const summaryPanel = $('report-summary');

            // Hide/show filters based on report type
            if (currentReportType === 'sales') {
                userRoleDiv.style.display = 'none';
                stockStatusDiv.style.display = 'none';
                summaryPanel.classList.remove('hidden');
                summaryPanel.classList.add('flex');
                $('report-table-head').innerHTML = `
                    <tr>
                        <th>Day</th>
                        <th>Total Orders</th>
                        <th>Products Sold</th>
                        <th>Sales</th>
                    </tr>
                `;
            } else if (currentReportType === 'userlogs') {
                userRoleDiv.style.display = 'flex';
                userRoleDiv.style.flexDirection = 'column';
                userRoleDiv.style.gap = '0';
                stockStatusDiv.style.display = 'none';
                summaryPanel.classList.add('hidden');
                summaryPanel.classList.remove('flex');
                $('report-table-head').innerHTML = `
                    <tr>
                        <th>Date & Time</th>
                        <th>User</th>
                        <th>Action Performed</th>
                    </tr>
                `;
            } else if (currentReportType === 'stocks') {
                userRoleDiv.style.display = 'none';
                stockStatusDiv.style.display = 'flex';
                stockStatusDiv.style.flexDirection = 'column';
                stockStatusDiv.style.gap = '0';
                summaryPanel.classList.add('hidden');
                summaryPanel.classList.remove('flex');
                $('report-table-head').innerHTML = `
                    <tr>
                        <th>Category</th>
                        <th>Product Name</th>
                        <th>Stock Level</th>
                        <th>Status</th>
                    </tr>
                `;
            }

            // Show/hide date range pickers
            const showDates = currentReportType !== 'stocks';
            $('dateFromDiv').style.display = showDates ? '' : 'none';
            $('dateToDiv').style.display = showDates ? '' : 'none';
        }

        // --- Report Data Processing ---
        function generateReport() {
            const dateFrom = val('dateFrom');
            const dateTo = val('dateTo');

            if (currentReportType !== 'stocks' && (!dateFrom || !dateTo)) {
                showAlert('Please select both From and To dates.');
                return;
            }

            loadReportData();
        }

        async function loadReportData() {
            const roleParam = currentReportType === 'userlogs' ? `&role=${val('userRole')}` : '';
            const stockParam = currentReportType === 'stocks' ? `&status=${val('stockStatus')}` : '';
            const dateParams = currentReportType === 'stocks' ? '' : `from=${val('dateFrom')}&to=${val('dateTo')}`;

            try {
                const response = await fetch(`/api/reports/${currentReportType}?${dateParams}${roleParam}${stockParam}`);

                if (!response.ok) {
                    showAlert('Failed to load report data. Server returned an error.');
                    reportData = [];
                } else {
                    reportData = await response.json();
                }
                processData();
            } catch (error) {
                console.error('Report fetch error:', error);
                showAlert('Could not connect to the server.');
                reportData = [];
                processData();
            }
        }

        function processData() {
            currentPage = 1;
            if (currentReportType === 'sales') {
                reportData = reportData.map(r => ({
                    day: new Date(r.day).toLocaleDateString('en-PH', { month: 'numeric', day: 'numeric', year: '2-digit' }),
                    orders: parseInt(r.orders) || 0,
                    productsSold: parseInt(r.productsSold) || 0,
                    salesRaw: parseFloat(r.sales) || 0,
                    expensesRaw: parseFloat(r.expenses) || 0,
                    sales: `₱ ${parseFloat(r.sales || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`
                }));
            } else if (currentReportType === 'userlogs') {
                reportData = reportData.map(r => {
                    const dt = new Date(r.dateTime);
                    const roleLabelMap = { 'Admin': 'Admin', 'SalesStaff': 'Sales Staff', 'InventoryStaff': 'Inventory Staff' };
                    return {
                        date: dt.toLocaleDateString('en-PH', { month: 'numeric', day: 'numeric', year: 'numeric' }),
                        time: dt.toLocaleTimeString('en-PH', { hour: 'numeric', minute: '2-digit', hour12: true }),
                        userName: r.userName || '—',
                        userType: roleLabelMap[r.userType] || r.userType || '—',
                        action: r.action || '—'
                    };
                });
            }

            renderReport();
            if (currentReportType === 'sales') {
                updateSummary();
            }
        }

        function renderReport() {
            const tbody = $('report-table-body');
            const limit = 10;
            let filteredData = [...reportData];

            if (currentReportType === 'userlogs') {
                const roleFilter = val('userRole');
                if (roleFilter) {
                    filteredData = filteredData.filter(log => {
                        if (roleFilter === 'admin') return log.userType.toLowerCase().includes('admin');
                        if (roleFilter === 'inventory') return log.userType.toLowerCase().includes('inventory');
                        if (roleFilter === 'sales') return log.userType.toLowerCase().includes('sales');
                        return true;
                    });
                }
            } else if (currentReportType === 'stocks') {
                const stockFilter = val('stockStatus');
                if (stockFilter) {
                    filteredData = filteredData.filter(item => item.status === (stockFilter === 'low' ? 'Low Stock' : 'Out of Stock'));
                }
            }

            const totalPages = Math.ceil(filteredData.length / limit) || 1;
            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            const startIndex = (currentPage - 1) * limit;
            const endIndex = startIndex + limit;
            const paginatedData = filteredData.slice(startIndex, endIndex);

            if (currentReportType === 'sales') {
                tbody.innerHTML = paginatedData.map(r => `
                    <tr>
                        <td>${r.day}</td>
                        <td>${r.orders}</td>
                        <td>${r.productsSold}</td>
                        <td>${r.sales}</td>
                    </tr>
                `).join('') || '<tr><td colspan="4" class="center-text">No data available.</td></tr>';
            } else if (currentReportType === 'userlogs') {
                tbody.innerHTML = paginatedData.map(r => `
                    <tr>
                        <td>
                            <div class="datetime-cell">
                                <span class="date-label">${r.date}</span>
                                <span class="time-label">${r.time}</span>
                            </div>
                        </td>
                        <td>
                            <div class="user-cell">
                                <span class="user-name">${r.userName}</span>
                                <span class="user-type">${r.userType}</span>
                            </div>
                        </td>
                        <td>${r.action}</td>
                    </tr>
                `).join('') || '<tr><td colspan="3" class="center-text">No data available.</td></tr>';
            } else if (currentReportType === 'stocks') {
                tbody.innerHTML = paginatedData.map(r => `
                    <tr>
                        <td>${r.category}</td>
                        <td>${r.product}</td>
                        <td>${r.stocks}</td>
                        <td><span class="status-pill ${r.status === 'Low Stock' ? 'status-lowstock' : 'status-outstock'}">${r.status}</span></td>
                    </tr>
                `).join('') || '<tr><td colspan="4" class="center-text">No data available.</td></tr>';
            }

            updatePaginationUI(filteredData.length, totalPages);
        }

        function updateSummary() {
            if (currentReportType !== 'sales') return;

            const totalSales = reportData.reduce((sum, r) => sum + (r.salesRaw || 0), 0);
            const totalExpenses = reportData.reduce((sum, r) => sum + (r.expensesRaw || 0), 0);
            const totalRevenue = totalSales - totalExpenses;
            const totalOrders = reportData.reduce((sum, r) => sum + r.orders, 0);
            const totalProductsSold = reportData.reduce((sum, r) => sum + r.productsSold, 0);

            $('summaryTotal').textContent = `₱ ${totalSales.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
            $('summaryExpenses').textContent = `₱ ${totalExpenses.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
            $('summaryRevenue').textContent = `₱ ${totalRevenue.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
            $('summaryOrders').textContent = totalOrders;
            $('summaryProductsSold').textContent = totalProductsSold;
        }

        function updatePaginationUI(totalItems, totalPages) {
            const container = $('pagination-controls');
            if (totalItems <= 10) {
                container.classList.add('hidden');
                container.classList.remove('flex');
                return;
            }

            container.classList.remove('hidden');
            container.classList.add('flex');
            $('page-info').textContent = `Page ${currentPage} of ${totalPages}`;
            $('btn-prev').disabled = currentPage === 1;
            $('btn-next').disabled = currentPage === totalPages;
        }

        function changePage(step) {
            currentPage += step;
            renderReport();
        }

        // --- Export Functions ---

        function getExportData() {
            let headers = [];
            let rows = [];

            if (currentReportType === 'sales') {
                headers = ['Day', 'Total Orders', 'Products Sold', 'Sales'];
                rows = reportData.map(r => [r.day, r.orders, r.productsSold, r.sales]);
            } else if (currentReportType === 'userlogs') {
                headers = ['Date', 'Time', 'User', 'Role', 'Action Performed'];
                rows = reportData.map(r => [r.date, r.time, r.userName, r.userType, r.action]);
            } else if (currentReportType === 'stocks') {
                headers = ['Category', 'Product Name', 'Stock Level', 'Status'];
                rows = reportData.map(r => [r.category, r.product, r.stocks, r.status]);
            }

            return { headers, rows };
        }

        function exportToExcel() {
            if (!reportData || reportData.length === 0) {
                showAlert('No data to export. Generate a report first.');
                return;
            }

            const { headers, rows } = getExportData();
            const reportLabel = currentReportType === 'sales' ? 'Sales Performance'
                : currentReportType === 'userlogs' ? 'User Logs' : 'Stock Alerts';

            // Build CSV content with BOM for Excel compatibility
            let csv = '\uFEFF'; // UTF-8 BOM
            csv += `Udicon Trading - ${reportLabel} Report\n`;
            if (currentReportType !== 'stocks') {
                csv += `Date Range: ${val('dateFrom')} to ${val('dateTo')}\n`;
            }
            csv += `Generated: ${new Date().toLocaleString('en-PH')}\n\n`;

            // Add summary for sales
            if (currentReportType === 'sales') {
                const totalSales = reportData.reduce((sum, r) => sum + (r.salesRaw || 0), 0);
                const totalOrders = reportData.reduce((sum, r) => sum + r.orders, 0);
                const totalProductsSold = reportData.reduce((sum, r) => sum + r.productsSold, 0);
                csv += `Total Sales,₱ ${totalSales.toLocaleString('en-US', { minimumFractionDigits: 2 })}\n`;
                csv += `Total Orders,${totalOrders}\n`;
                csv += `Total Products Sold,${totalProductsSold}\n\n`;
            }

            // Escape CSV fields
            const escapeCSV = (val) => {
                const str = String(val ?? '');
                if (str.includes(',') || str.includes('"') || str.includes('\n')) {
                    return '"' + str.replace(/"/g, '""') + '"';
                }
                return str;
            };

            csv += headers.map(escapeCSV).join(',') + '\n';
            rows.forEach(row => {
                csv += row.map(escapeCSV).join(',') + '\n';
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `udicon-${currentReportType}-report-${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);
        }

        function exportAsImage() {
            if (!reportData || reportData.length === 0) {
                showAlert('No data to export. Generate a report first.');
                return;
            }

            const { headers, rows } = getExportData();
            const reportLabel = currentReportType === 'sales' ? 'Sales Performance'
                : currentReportType === 'userlogs' ? 'User Logs' : 'Stock Alerts';

            const ROWS_PER_IMAGE = 15;
            const padding = 40;
            const rowHeight = 36;
            const headerHeight = 44;
            const titleHeight = 80;
            const totalPages = Math.ceil(rows.length / ROWS_PER_IMAGE) || 1;
            const baseName = `udicon-${currentReportType}-report-${new Date().toISOString().split('T')[0]}`;

            // Compute column widths across ALL rows for consistency
            const colWidths = headers.map((h, i) => {
                let maxLen = h.length;
                rows.forEach(row => {
                    const cellLen = String(row[i] ?? '').length;
                    if (cellLen > maxLen) maxLen = cellLen;
                });
                return Math.max(maxLen * 9 + 30, 120);
            });
            const tableWidth = colWidths.reduce((s, w) => s + w, 0);
            const canvasWidth = tableWidth + padding * 2;

            const dateInfo = currentReportType === 'stocks'
                ? `Generated: ${new Date().toLocaleString('en-PH')}`
                : `${val('dateFrom')} to ${val('dateTo')}  •  Generated: ${new Date().toLocaleString('en-PH')}`;

            for (let page = 0; page < totalPages; page++) {
                const pageRows = rows.slice(page * ROWS_PER_IMAGE, (page + 1) * ROWS_PER_IMAGE);
                const canvasHeight = titleHeight + headerHeight + pageRows.length * rowHeight + padding * 2;

                const canvas = document.createElement('canvas');
                canvas.width = canvasWidth;
                canvas.height = canvasHeight;
                const ctx = canvas.getContext('2d');

                // Background
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvasWidth, canvasHeight);

                // Title
                ctx.fillStyle = '#1a1a2e';
                ctx.font = 'bold 20px Arial, sans-serif';
                const pageLabel = totalPages > 1 ? ` (Page ${page + 1} of ${totalPages})` : '';
                ctx.fillText(`Udicon Trading — ${reportLabel} Report${pageLabel}`, padding, padding + 24);
                ctx.fillStyle = '#666666';
                ctx.font = '13px Arial, sans-serif';
                ctx.fillText(dateInfo, padding, padding + 48);

                const tableTop = padding + titleHeight;
                let x, y;

                // Header row
                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect(padding, tableTop, tableWidth, headerHeight);
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 13px Arial, sans-serif';
                x = padding;
                headers.forEach((h, i) => {
                    ctx.fillText(h, x + 12, tableTop + headerHeight / 2 + 5);
                    x += colWidths[i];
                });

                // Data rows
                pageRows.forEach((row, ri) => {
                    y = tableTop + headerHeight + ri * rowHeight;
                    ctx.fillStyle = ri % 2 === 0 ? '#f8f9fa' : '#ffffff';
                    ctx.fillRect(padding, y, tableWidth, rowHeight);

                    // Row border
                    ctx.strokeStyle = '#e0e0e0';
                    ctx.lineWidth = 0.5;
                    ctx.beginPath();
                    ctx.moveTo(padding, y + rowHeight);
                    ctx.lineTo(padding + tableWidth, y + rowHeight);
                    ctx.stroke();

                    ctx.fillStyle = '#333333';
                    ctx.font = '12px Arial, sans-serif';
                    x = padding;
                    row.forEach((cell, ci) => {
                        const txt = String(cell ?? '');
                        const maxChars = Math.floor((colWidths[ci] - 24) / 7);
                        const display = txt.length > maxChars ? txt.substring(0, maxChars) + '…' : txt;
                        ctx.fillText(display, x + 12, y + rowHeight / 2 + 4);
                        x += colWidths[ci];
                    });
                });

                // Outer border
                ctx.strokeStyle = '#cccccc';
                ctx.lineWidth = 1;
                ctx.strokeRect(padding, tableTop, tableWidth, headerHeight + pageRows.length * rowHeight);

                // Download this page
                const link = document.createElement('a');
                link.href = canvas.toDataURL('image/png');
                const suffix = totalPages > 1 ? `-page${page + 1}` : '';
                link.download = `${baseName}${suffix}.png`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        }

        // --- Initialization ---
        window.onAuthReady = function(role) {
            if (role !== 'Admin') {
                // Inventory staff cannot see User Logs
                const userLogsOpt = document.querySelector('#reportType option[value="userlogs"]');
                if (userLogsOpt) userLogsOpt.remove();
                const userRoleDiv = $('userRoleFilterDiv');
                if (userRoleDiv) userRoleDiv.style.display = 'none';
            }
        };

        document.addEventListener("DOMContentLoaded", () => {
            const today = new Date();
            const from = new Date(today.setDate(today.getDate() - 7));

            $('dateFrom').valueAsDate = from;
            $('dateTo').valueAsDate = new Date();

            updateReportUI();
            generateReport();
        });
    </script>
</body>

</html>

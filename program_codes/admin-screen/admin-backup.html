<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backups | Udicon Trading</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div id="sidebar"></div>

    <main class="dashboard-main">

        <div class="page-header">
            <h2>Backups</h2>
            <div class="toolbar-right">
                <button class="btn-create" id="btn-manual-backup">+ Create Manual Backup</button>
                <button class="btn-create" id="btn-backup-settings">Backup Settings</button>
            </div>
        </div>

        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Database</th>
                        <th>Files</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="backup-table-body">
                </tbody>
            </table>
        </div>

    </main>

    <div id="settings-modal" class="modal-overlay">
        <div class="modal-box">
            <h3>Schedule Settings</h3>
            <form id="settings-form">
                <div>
                    <label for="full-schedule">Full Backup Frequency</label>
                    <select id="full-schedule" required>
                        <option value="0 0 * * *">Daily at Midnight (Recommended)</option>
                        <option value="0 12 * * *">Daily at Noon</option>
                        <option value="0 0 * * 0">Weekly (Every Sunday)</option>
                    </select>
                </div>
                <div>
                    <label for="inc-schedule">Incremental Backup Frequency</label>
                    <select id="inc-schedule" required>
                        <option value="30 * * * *">Every Hour (Recommended)</option>
                        <option value="0 */3 * * *">Every 3 Hours</option>
                        <option value="0 */6 * * *">Every 6 Hours</option>
                    </select>
                </div>
                <div class="align-right">
                    <button type="button" class="modal-btn btn-cancel" id="cancel-settings-btn">Cancel</button>
                    <button type="submit" class="modal-btn btn-ok">Save</button>
                </div>
            </form>
        </div>
    </div>

    <div id="delete-modal" class="modal-overlay">
        <div class="modal-box">
            <p>Are you sure you want to delete this backup file? This cannot be undone.</p>
            <div>
                <button id="cancel-delete-btn" class="modal-btn btn-cancel">Cancel</button>
                <button id="confirm-delete-btn" class="modal-btn btn-danger">Delete</button>
            </div>
        </div>
    </div>

    <script src="../authGuard.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const tableBody = document.getElementById('backup-table-body');
        const btnManualBackup = document.getElementById('btn-manual-backup');
        
        // Elements for Settings Modal
        const btnSettings = document.getElementById('btn-backup-settings');
        const settingsModal = document.getElementById('settings-modal');
        const cancelSettingsBtn = document.getElementById('cancel-settings-btn');
        const settingsForm = document.getElementById('settings-form');

        // Elements for Delete Modal
        const deleteModal = document.getElementById('delete-modal');
        const confirmDeleteBtn = document.getElementById('confirm-delete-btn');
        const cancelDeleteBtn = document.getElementById('cancel-delete-btn');
        let backupToDeleteId = null; 

        fetchBackups();

        // --- MODAL EVENTS ---
        btnSettings.addEventListener('click', async () => {
            try {
                const response = await fetch('/api/backups/schedule');
                if (response.ok) {
                    const data = await response.json();
                    if (data.fullSchedule) document.getElementById('full-schedule').value = data.fullSchedule;
                    if (data.incSchedule) document.getElementById('inc-schedule').value = data.incSchedule;
                }
            } catch (error) {
                console.error("Failed to fetch current schedule settings:", error);
            }
            settingsModal.style.display = 'flex'; 
        });

        cancelSettingsBtn.addEventListener('click', () => {
            settingsModal.style.display = 'none';
        });

        cancelDeleteBtn.addEventListener('click', () => {
            deleteModal.style.display = 'none';
            backupToDeleteId = null;
        });

        window.onclick = function(event) {
            if (event.target == settingsModal) {
                settingsModal.style.display = "none";
            }
            if (event.target == deleteModal) {
                deleteModal.style.display = "none";
                backupToDeleteId = null;
            }
        }

        settingsForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fullSchedule = document.getElementById('full-schedule').value;
            const incSchedule = document.getElementById('inc-schedule').value;
            const submitBtn = settingsForm.querySelector('button[type="submit"]');
            
            submitBtn.innerText = "Saving...";
            submitBtn.disabled = true;

            try {
                const response = await fetch('/api/backups/schedule', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullSchedule, incSchedule })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    alert("Backup schedules updated successfully!");
                    settingsModal.style.display = 'none';
                } else {
                    alert(data.error || "Failed to update schedules.");
                }
            } catch (error) {
                console.error("Error:", error);
                alert("Network error updating schedules.");
            } finally {
                submitBtn.innerText = "Save";
                submitBtn.disabled = false;
            }
        });

        // --- TRIGGER MANUAL BACKUP ---
        btnManualBackup.addEventListener('click', async () => {
            btnManualBackup.innerText = "Generating...";
            btnManualBackup.disabled = true;

            try {
                const response = await fetch('/api/backups/manual', { method: 'POST' });
                const data = await response.json();
                
                if (response.ok) {
                    alert(data.message);
                    fetchBackups(); 
                } else {
                    alert(data.error);
                }
            } catch (error) {
                console.error("Error:", error);
                alert("Failed to create backup.");
            } finally {
                btnManualBackup.innerText = "+ Create Manual Backup";
                btnManualBackup.disabled = false;
            }
        });

        // --- FETCH BACKUPS ---
        async function fetchBackups() {
            try {
                const response = await fetch('/api/backups');
                const backups = await response.json();
                
                tableBody.innerHTML = ''; 

                if (backups.length === 0) {
                    // Replaced inline styles with a class call
                    tableBody.innerHTML = `<tr><td colspan="5" class="center-text">No backups found.</td></tr>`;
                    return;
                }

                backups.forEach(backup => {
                    const dateObj = new Date(backup.backupDate);
                    const formattedDate = dateObj.toLocaleString('en-GB', { 
                        day: '2-digit', month: 'short', year: 'numeric', 
                        hour: '2-digit', minute: '2-digit', hour12: true 
                    });

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${formattedDate}</td>
                        <td>${backup.fileName}</td>
                        <td>${backup.backupType}</td>
                        <td><span class="status-pill status-instock">Completed</span></td>
                        <td><button class="btn-delete" onclick="promptDelete(${backup.backupID})">Delete</button></td>
                    `;
                    tableBody.appendChild(tr);
                });
            } catch (error) {
                console.error("Error fetching backups:", error);
            }
        }

        // --- DELETE BACKUP LOGIC ---
        window.promptDelete = function(id) {
            backupToDeleteId = id; 
            deleteModal.style.display = 'flex'; 
        };

        confirmDeleteBtn.addEventListener('click', async () => {
            if (!backupToDeleteId) return;

            confirmDeleteBtn.innerText = "Deleting...";
            confirmDeleteBtn.disabled = true;

            try {
                const response = await fetch(`/api/backups/${backupToDeleteId}`, { method: 'DELETE' });
                const data = await response.json();
                
                if (response.ok) {
                    fetchBackups(); 
                } else {
                    alert(data.error);
                }
            } catch (error) {
                console.error("Error deleting backup:", error);
            } finally {
                deleteModal.style.display = 'none';
                backupToDeleteId = null;
                confirmDeleteBtn.innerText = "Delete";
                confirmDeleteBtn.disabled = false;
            }
        });
    });
    </script>
</body>
</html>
